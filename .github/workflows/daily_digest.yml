name: Daily Tech News Digest

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  send_digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Start Quarkus Dev and Save PID
        run: |
          ./gradlew quarkusDev -Dquarkus.args="--send-now" > quarkus_output.log 2>&1 &
          echo $! > quarkus.pid
          echo "Quarkus started with PID: $(cat quarkus.pid)"
          ps aux | grep quarkus
          echo "Waiting 120 seconds for Quarkus to initialize..."
          sleep 120

      - name: Stop Quarkus Process
        if: always()
        run: |
          QUARKUS_PID=$(cat quarkus.pid)
          echo "Killing PID $QUARKUS_PID"

          kill -9 $QUARKUS_PID || true

        env:
          # Your Secrets from GitHub Settings
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          MAILER_USER: ${{ secrets.MAILER_USER }}
          RECEIVER_USER: ${{ secrets.RECEIVER_USER }}