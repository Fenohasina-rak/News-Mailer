name: Daily Tech News Digest

on:
  schedule:
    - cron: '0 5 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  send_digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Run Quarkus Application
        run: |
          ./gradlew build -x test
          java -Dquarkus.main.run-and-exit=true \
               -Dquarkus.http.host-enabled=false \
               -jar build/quarkus-app/quarkus-run.jar
        env:
          # Your Secrets from GitHub Settings
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          MAILER_USER: ${{ secrets.MAILER_USER }}
          RECEIVER_USER: ${{ secrets.RECEIVER_USER }}