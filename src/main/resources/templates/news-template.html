<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif; background-color: #f6f8fa; margin: 0; padding: 5px;">

<div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border: 1px solid #d0d7de; border-radius: 12px; overflow: hidden;">

    <div style="background: #0969da; padding: 5px; text-align: center;">
        <h1 style="margin: 0; color: #ffffff; font-size: 24px;">DAILY NEWS</h1>
    </div>

    <div style="padding: 20px;">
        {#for story in stories}
        <div style="margin-bottom: 5px; border-bottom: 1px solid #eeeeee; padding-bottom: 5px;">

            <span style="background-color: #fff8c5; color: #9a6700; font-size: 11px; font-weight: bold; padding: 2px 3px; border-radius: 10px;">{story.updatedAt}</span>

            <a href="{story.url}" style="display: block; font-size: 18px; color: #0969da; text-decoration: none; font-weight: bold; margin-top: 5px;">
                {story.title}
            </a>

            <div style="font-size: 14px; color: #57606a; margin-top: 2px;">
                {story.headline.raw}
            </div>
        </div>
        {/for}
    </div>

    <div style="background-color: #f6f8fa; padding: 5px; text-align: center; font-size: 12px; color: #57606a;">
        Tech News sent by Automated Email
    </div>
</div>

</body>
</html>
